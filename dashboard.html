<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Dashboard — AI para tu Negocio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.1.0/dist/iconify-icon.min.js"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],display:['Space Grotesk','sans-serif']},colors:{dark:{50:'#f8fafc',100:'#e2e8f0',200:'#cbd5e1',300:'#94a3b8',400:'#64748b',500:'#475569',600:'#334155',700:'#1e293b',800:'#0f172a',900:'#020617',950:'#010409'},accent:{DEFAULT:'#6366f1',light:'#818cf8',dark:'#4f46e5'},neon:{green:'#22c55e',yellow:'#facc15',purple:'#a855f7',cyan:'#22d3ee'}}}}}
</script>
<style>
body{font-family:'Inter',sans-serif}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(140px);opacity:.08;animation:float 25s infinite ease-in-out}
.aurora-blob:nth-child(1){width:600px;height:600px;background:#6366f1;top:-20%;left:-10%;animation-delay:0s}
.aurora-blob:nth-child(2){width:500px;height:500px;background:#22d3ee;bottom:-15%;right:-10%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
.glass{background:rgba(15,23,42,.5);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.glass-strong{background:rgba(15,23,42,.7);backdrop-filter:blur(32px) saturate(200%);border:1px solid rgba(255,255,255,.09);box-shadow:0 20px 60px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}
.gradient-text{background:linear-gradient(135deg,#6366f1 0%,#22d3ee 50%,#a855f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.quiz-option{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:all .2s;background:rgba(15,23,42,.3)}
.quiz-option:hover{border-color:rgba(99,102,241,.35);background:rgba(99,102,241,.06)}
.quiz-option.selected{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.12)}
.quiz-option input[type=radio]{display:none}
.quiz-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;margin-top:1px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.quiz-option.selected .quiz-dot{border-color:#6366f1;background:#6366f1}
.quiz-option.selected .quiz-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:white}
.progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#22d3ee);border-radius:99px;transition:width .5s cubic-bezier(.25,.8,.25,1)}
.score-ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.score-ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ring-color) var(--ring-pct),rgba(255,255,255,.05) var(--ring-pct));mask:radial-gradient(farthest-side,transparent calc(100% - 10px),black calc(100% - 10px));-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 10px),black calc(100% - 10px))}
.rec-card{padding:20px;border-radius:14px;border:1px solid rgba(255,255,255,.07);background:rgba(15,23,42,.4);transition:all .3s}
.rec-card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,.25)}
.btn{padding:14px 28px;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px;border:none}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.35)}
.btn-secondary{background:rgba(15,23,42,.5);border:1px solid rgba(255,255,255,.1);color:#94a3b8}
.btn-secondary:hover{color:white;border-color:rgba(255,255,255,.2)}
.btn-wa{background:#22c55e;color:white}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,.3)}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh}
#app{display:none}
</style>
</head>
<body class="bg-dark-950 text-white">

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<!-- Loading -->
<div id="loading" class="relative z-10">
  <div class="text-dark-400 text-sm">Cargando...</div>
</div>

<!-- App -->
<div id="app" class="relative z-10 min-h-screen">

  <!-- Header -->
  <header class="glass border-b border-white/5 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/sergio-ai-consulting/" class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center text-white font-bold text-xs">S</div>
        <span class="font-display font-bold text-sm">Sergio AI</span>
      </a>
      <div class="flex items-center gap-4">
        <span id="userEmail" class="text-dark-400 text-sm hidden md:block"></span>
        <button onclick="signOut()" class="text-dark-400 hover:text-white transition-colors text-sm flex items-center gap-1.5">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Salir
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Welcome section -->
    <div class="mb-10">
      <div class="text-dark-400 text-sm mb-1">Bienvenido/a</div>
      <h1 class="font-display text-3xl font-bold"><span id="userName">tu nombre</span> 👋</h1>
    </div>

    <!-- QUIZ SECTION (shown when quiz not done) -->
    <div id="quizSection">

      <div class="glass-strong rounded-2xl p-8 mb-6">
        <div class="flex items-center justify-between mb-6">
          <div>
            <div class="text-xs text-accent-light font-semibold uppercase tracking-widest mb-1">Paso 1 de 2</div>
            <h2 class="font-display text-xl font-bold">Análisis de IA para tu negocio</h2>
            <p class="text-dark-400 text-sm mt-1">5 preguntas · 2 minutos · gratis</p>
          </div>
          <div class="text-right">
            <div class="text-2xl font-display font-bold gradient-text" id="qCounter">1 / 5</div>
          </div>
        </div>
        <div class="progress-bar mb-8">
          <div class="progress-fill" id="progressFill" style="width:20%"></div>
        </div>

        <!-- Questions -->
        <div id="questionContainer"></div>

        <!-- Nav buttons -->
        <div class="flex justify-between mt-8">
          <button id="prevBtn" onclick="prevQ()" class="btn btn-secondary hidden">← Anterior</button>
          <div></div>
          <button id="nextBtn" onclick="nextQ()" class="btn btn-primary">Siguiente →</button>
        </div>
      </div>

    </div>

    <!-- RESULTS SECTION (shown after quiz) -->
    <div id="resultsSection" class="hidden">

      <!-- Score card -->
      <div class="glass-strong rounded-2xl p-8 mb-6">
        <div class="flex flex-col md:flex-row items-center gap-8">
          <div class="flex-shrink-0 text-center">
            <div class="score-ring mx-auto mb-3" id="scoreRing">
              <div class="text-center">
                <div class="font-display text-4xl font-bold" id="scoreNum">0</div>
                <div class="text-dark-400 text-xs">de 100</div>
              </div>
            </div>
            <div class="text-sm font-semibold" id="scoreLabelEl"></div>
          </div>
          <div class="flex-1">
            <div class="text-xs text-accent-light font-semibold uppercase tracking-widest mb-2">Tu diagnóstico IA</div>
            <h2 class="font-display text-2xl font-bold mb-3" id="resultTitle"></h2>
            <p class="text-dark-300 text-sm leading-relaxed" id="resultDesc"></p>
          </div>
        </div>
      </div>

      <!-- Recommendations -->
      <div class="mb-6">
        <h3 class="font-display text-lg font-bold mb-4">Qué automatizar primero</h3>
        <div class="grid md:grid-cols-3 gap-4" id="recCards"></div>
      </div>

      <!-- CTA -->
      <div class="glass-strong rounded-2xl p-8 text-center">
        <div class="text-xs text-neon-yellow font-semibold uppercase tracking-widest mb-3">Siguiente paso</div>
        <h3 class="font-display text-xl font-bold mb-3" id="ctaTitle"></h3>
        <p class="text-dark-400 text-sm mb-6 max-w-md mx-auto" id="ctaDesc"></p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <a id="waBtn" href="#" target="_blank" class="btn btn-wa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Hablar con Sergio
          </a>
          <button onclick="resetQuiz()" class="btn btn-secondary">
            Repetir análisis
          </button>
        </div>
        <p class="text-dark-500 text-xs mt-4">Responde en menos de 24h · Buenos Aires</p>
      </div>

    </div>

  </main>
</div>

<script>
const { createClient } = supabase
const db = createClient(
  'https://wdnrdxqkajobjaorssza.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkbnJkeHFrYWpvYmphb3Jzc3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjkwMDgsImV4cCI6MjA5NzkwNTAwOH0.5C8ORvvh9AOURwrEjlaNawjNrc-kortPZKKF6TgTPpg'
)

// ── Auth guard ──
let currentUser = null
db.auth.getSession().then(({ data: { session } }) => {
  if (!session) { window.location.href = '/sergio-ai-consulting/login.html'; return }
  currentUser = session.user
  initDashboard(session.user)
})

db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') window.location.href = '/sergio-ai-consulting/login.html'
  if (event === 'SIGNED_IN' && session) {
    currentUser = session.user
    initDashboard(session.user)
  }
})

function signOut() {
  db.auth.signOut()
}

// ── Init ──
function initDashboard(user) {
  document.getElementById('loading').style.display = 'none'
  document.getElementById('app').style.display = 'block'

  const meta = user.user_metadata || {}
  const name = meta.full_name || user.email.split('@')[0]
  document.getElementById('userName').textContent = name
  document.getElementById('userEmail').textContent = user.email

  const saved = localStorage.getItem('ai_quiz_done_' + user.id)
  if (saved) {
    showResults(JSON.parse(saved))
  } else {
    renderQuestion(0)
  }
}

// ── Quiz data ──
const questions = [
  {
    q: '¿Cuánto tiempo pasás semanalmente en tareas repetitivas?',
    opts: [
      { text: 'Menos de 5 horas', pts: 1 },
      { text: '5 a 15 horas', pts: 2 },
      { text: '15 a 30 horas', pts: 3 },
      { text: 'Más de 30 horas', pts: 4 }
    ]
  },
  {
    q: '¿Cómo manejás la comunicación con clientes?',
    opts: [
      { text: 'Todo manual, yo mismo/a', pts: 4 },
      { text: 'Equipo lo hace, sin automatización', pts: 3 },
      { text: 'Algo automatizado, pero básico', pts: 2 },
      { text: 'Mayormente automatizado', pts: 1 }
    ]
  },
  {
    q: '¿Cómo generás contenido para tu negocio (posts, descripciones, emails)?',
    opts: [
      { text: 'Lo escribo todo yo, desde cero', pts: 4 },
      { text: 'Contrato diseñadores/redactores', pts: 3 },
      { text: 'Uso alguna IA a veces', pts: 2 },
      { text: 'Mayormente con IA', pts: 1 }
    ]
  },
  {
    q: '¿Cómo tomás decisiones de negocio?',
    opts: [
      { text: 'Por intuición, sin datos claros', pts: 4 },
      { text: 'Excel manual, actualizado cada tanto', pts: 3 },
      { text: 'Tengo algo de dashboard básico', pts: 2 },
      { text: 'Con datos en tiempo real', pts: 1 }
    ]
  },
  {
    q: '¿Cuál es tu experiencia con herramientas de IA?',
    opts: [
      { text: 'Nunca las usé', pts: 2 },
      { text: 'Las probé pero las dejé', pts: 4 },
      { text: 'Uso algunas básicas (ChatGPT, etc.)', pts: 2 },
      { text: 'Uso varias activamente', pts: 1 }
    ]
  }
]

let currentQ = 0
let answers = new Array(questions.length).fill(null)

function renderQuestion(idx) {
  const q = questions[idx]
  const container = document.getElementById('questionContainer')
  container.innerHTML = `
    <div class="mb-6">
      <h3 class="font-semibold text-lg leading-snug mb-5">${q.q}</h3>
      <div class="space-y-3">
        ${q.opts.map((o, i) => `
          <label class="quiz-option ${answers[idx] === i ? 'selected' : ''}" onclick="selectOpt(${idx}, ${i})">
            <div class="quiz-dot">${answers[idx] === i ? '' : ''}</div>
            <span class="text-sm leading-snug">${o.text}</span>
          </label>
        `).join('')}
      </div>
    </div>
  `
  document.getElementById('qCounter').textContent = `${idx + 1} / ${questions.length}`
  document.getElementById('progressFill').style.width = `${((idx + 1) / questions.length) * 100}%`
  document.getElementById('prevBtn').classList.toggle('hidden', idx === 0)
  document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? 'Ver mi resultado →' : 'Siguiente →'
}

function selectOpt(qIdx, optIdx) {
  answers[qIdx] = optIdx
  renderQuestion(qIdx)
}

function nextQ() {
  if (answers[currentQ] === null) {
    const opts = document.querySelectorAll('.quiz-option')
    opts.forEach(o => { o.style.animation = 'none'; setTimeout(() => o.style.borderColor = 'rgba(244,63,94,.4)', 0) })
    setTimeout(() => opts.forEach(o => o.style.borderColor = ''), 1000)
    return
  }
  if (currentQ < questions.length - 1) {
    currentQ++
    renderQuestion(currentQ)
  } else {
    finishQuiz()
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQuestion(currentQ) }
}

function finishQuiz() {
  const totalPts = answers.reduce((sum, ans, qi) => sum + questions[qi].opts[ans].pts, 0)
  const maxPts = questions.length * 4
  const score = Math.round((totalPts / maxPts) * 100)
  const bizType = currentUser?.user_metadata?.business_type || 'general'

  const result = { score, totalPts, bizType, answers, ts: Date.now() }
  localStorage.setItem('ai_quiz_done_' + currentUser.id, JSON.stringify(result))
  showResults(result)
}

function showResults(result) {
  document.getElementById('quizSection').classList.add('hidden')
  document.getElementById('resultsSection').classList.remove('hidden')

  const { score } = result

  // Score ring
  let color, label, title, desc, recs, ctaTitle, ctaDesc, waMsg

  if (score <= 30) {
    color = '#22c55e'; label = '⚡ IA Ready'
    title = 'Estás adelantado/a — optimizá lo que falta'
    desc = 'Ya usás herramientas modernas. Quedan algunas oportunidades puntuales para ahorrar tiempo y costos. Un audit rápido identifica exactamente qué queda.'
    recs = [
      { icon: '🔍', title: 'Audit de gaps', desc: 'Identificar los 2-3 procesos que todavía se hacen manual' },
      { icon: '🔗', title: 'Integración API', desc: 'Conectar herramientas que ya usás para flujo automático' },
      { icon: '📊', title: 'Dashboard unificado', desc: 'Todo el negocio en una pantalla, actualizado en tiempo real' }
    ]
    ctaTitle = 'Reservar audit de optimización'
    ctaDesc = 'Sesión de 1h para identificar los gaps restantes. Gratis, sin compromiso.'
    waMsg = 'Hola Sergio, hice el análisis IA y salí en nivel Ready. Me gustaría optimizar lo que falta.'
  } else if (score <= 60) {
    color = '#6366f1'; label = '🚀 Alto potencial'
    title = '10-20 horas semanales listos para automatizar'
    desc = 'Tu negocio tiene oportunidades claras de automatización. Con 3-5 herramientas bien configuradas podés recuperar entre 10 y 20 horas por semana.'
    recs = [
      { icon: '💬', title: 'Atención al cliente', desc: 'Bot de WhatsApp/Telegram que responde las preguntas frecuentes automáticamente' },
      { icon: '✍️', title: 'Generación de contenido', desc: 'Sistema IA para posts, descripciones de productos y respuestas a clientes' },
      { icon: '📈', title: 'Reporte automático', desc: 'Dashboard que se actualiza solo: ventas, clientes, pendientes' }
    ]
    ctaTitle = 'Setup de IA — desde $500'
    ctaDesc = '3-5 herramientas configuradas en 3-5 días. Entrenamiento incluido. Primera semana ya ves resultados.'
    waMsg = 'Hola Sergio, hice el análisis y salí en Alto Potencial. Me interesa el Setup de IA.'
  } else if (score <= 80) {
    color = '#f59e0b'; label = '🔥 Transformación lista'
    title = 'Podés automatizar 20-40 horas semanales'
    desc = 'Hay mucho trabajo manual que IA ya puede hacer. El impacto puede ser transformador: ahorro de tiempo, reducción de costos y mejor experiencia para tus clientes.'
    recs = [
      { icon: '🤖', title: 'Automatización total de comunicación', desc: 'CRM + bot + seguimiento automático de leads sin intervención humana' },
      { icon: '🏭', title: 'Workflow de producción/operaciones', desc: 'Pipeline de tareas automatizado — tu equipo ejecuta, no administra' },
      { icon: '💡', title: 'IA para decisiones', desc: 'Reportes automáticos con recomendaciones basadas en tus datos reales' }
    ]
    ctaTitle = 'Integración completa — desde $2,000'
    ctaDesc = 'Proyecto de 2-4 semanas. Bots custom, APIs conectadas, equipo entrenado. ROI en el primer mes.'
    waMsg = 'Hola Sergio, hice el análisis y salí en Transformación Lista. Me interesa la integración completa.'
  } else {
    color = '#f43f5e'; label = '🚨 Acción urgente'
    title = 'Estás perdiendo ventaja competitiva cada día'
    desc = 'Casi todo se hace manualmente. Esto significa horas perdidas, errores humanos y costos evitables. Las soluciones existen y son rápidas de implementar.'
    recs = [
      { icon: '⚡', title: 'Automatización express', desc: 'Los 3 procesos que más tiempo te comen, automatizados en 48h' },
      { icon: '💰', title: 'Reducción de costos operativos', desc: 'Reemplazar trabajo manual repetitivo por bots y flujos automáticos' },
      { icon: '🎯', title: 'Sistema de ventas automatizado', desc: 'Captura → seguimiento → cierre, todo con IA. Sin perder ningún lead' }
    ]
    ctaTitle = 'Setup urgente — empezamos esta semana'
    ctaDesc = 'Cada semana sin automatizar es dinero y tiempo perdido. Empezamos con lo más urgente en 24h.'
    waMsg = 'Hola Sergio, hice el análisis y salí en Acción Urgente. Necesito automatizar lo antes posible.'
  }

  const scoreRing = document.getElementById('scoreRing')
  scoreRing.style.setProperty('--ring-color', color)
  scoreRing.style.setProperty('--ring-pct', score + '%')
  document.getElementById('scoreNum').textContent = score
  document.getElementById('scoreNum').style.color = color
  document.getElementById('scoreLabelEl').textContent = label
  document.getElementById('scoreLabelEl').style.color = color
  document.getElementById('resultTitle').textContent = title
  document.getElementById('resultDesc').textContent = desc
  document.getElementById('ctaTitle').textContent = ctaTitle
  document.getElementById('ctaDesc').textContent = ctaDesc

  const encodedMsg = encodeURIComponent(waMsg)
  document.getElementById('waBtn').href = `https://wa.me/5491140466022?text=${encodedMsg}`

  document.getElementById('recCards').innerHTML = recs.map(r => `
    <div class="rec-card">
      <div class="text-2xl mb-3">${r.icon}</div>
      <div class="font-semibold text-sm mb-1">${r.title}</div>
      <div class="text-dark-400 text-xs leading-relaxed">${r.desc}</div>
    </div>
  `).join('')
}

function resetQuiz() {
  if (!currentUser) return
  localStorage.removeItem('ai_quiz_done_' + currentUser.id)
  currentQ = 0
  answers = new Array(questions.length).fill(null)
  document.getElementById('resultsSection').classList.add('hidden')
  document.getElementById('quizSection').classList.remove('hidden')
  renderQuestion(0)
}
</script>
</body>
</html>
